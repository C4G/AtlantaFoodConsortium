name: Build & Deploy Containers

on:
  push:
    branches: ['staging']
  workflow_dispatch:

jobs:
  production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          # list of Docker images to use as base name for tags
          images: |
            ghcr.io/c4g/atlanta-food-consortium
          # generate Docker tags based on the following events/attributes
          tags: |
            type=ref,event=branch
            type=sha,format=long,prefix=
            type=raw,value=latest

      - name: Build server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Meta (Migrations)
        id: meta-migrations
        uses: docker/metadata-action@v5
        with:
          # list of Docker images to use as base name for tags
          images: |
            ghcr.io/c4g/atlanta-food-consortium-migrations
          # generate Docker tags based on the following events/attributes
          tags: |
            type=ref,event=branch
            type=sha,format=long,prefix=
            type=raw,value=latest

      # TODO: Uncomment me!
      # - name: Build and push
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: .
      #     file: Dockerfile.migrations
      #     platforms: linux/amd64
      #     push: true
      #     cache-from: type=gha
      #     cache-to: type=gha,mode=max
      #     tags: ${{ steps.meta-migrations.outputs.tags }}
      #     labels: ${{ steps.meta-migrations.outputs.labels }}

      - name: Prune Package Versions
        uses: actions/delete-package-versions@v5.0.0
        with:   
          package-name: 'atlanta-food-consortium'    
          package-type: 'container'
          min-versions-to-keep: 10
          delete-only-untagged-versions: 'false'

      - name: Prune Package Versions
        uses: actions/delete-package-versions@v5.0.0
        with:   
          package-name: 'atlanta-food-consortium-migrations'    
          package-type: 'container'
          min-versions-to-keep: 10
          delete-only-untagged-versions: 'false'
          
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_KEY }}
          script: /atlanta-food-consortium-staging/update.sh
